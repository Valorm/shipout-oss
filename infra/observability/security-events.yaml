# Security Event Monitoring Channel
# These events bypass standard sampling and are routed directly to the SIEM (e.g., Splunk/Chronicle)

events:
  - name: AuthFailureSpike
    description: "Tracks anomalous authentication failures indicating credential stuffing or brute force."
    threshold: "> 20 per minute per IP"
    action: "Trigger Sev 2 Incident, Auto-block IP at WAF"

  - name: QuotaAbuseAttempt
    description: "Tracks users attempting to bypass scan limits or concurrent execution caps."
    threshold: "> 5 rejected requests per minute"
    action: "Temporarily suspend tenant API key"

  - name: WorkerCrash
    description: "Tracks unexpected microVM terminations or OOM kills."
    threshold: "> 0"
    action: "Trigger Sev 1 Incident, Quarantine Worker Node"

  - name: InvalidScanAttempt
    description: "Tracks malformed payloads rejected by the API Gateway schema validation."
    threshold: "> 50 per minute"
    action: "Log to SIEM, monitor for probing activity"

  - name: SSRFBlock
    description: "Tracks attempts to scan internal infrastructure, localhost, or cloud metadata."
    threshold: "> 0"
    action: "Trigger Sev 1 Incident, Suspend User Account Immediately"
