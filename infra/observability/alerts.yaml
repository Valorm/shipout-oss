groups:
  - name: vibeaudit-security-alerts
    rules:
      - alert: WorkerEscapeAttempt
        expr: rate(iptables_dropped_packets_total{chain="EGRESS", dst=~"169.254.169.254|10..*"}[1m]) > 10
        for: 10s
        labels:
          severity: critical
          zone: untrusted-execution
        annotations:
          summary: "Worker attempting to access blocked internal/metadata IPs"
          description: "A scan worker is generating dropped packets to internal CIDRs. Possible SSRF or container escape attempt."

      - alert: AuthBruteForce
        expr: rate(http_requests_total{service="auth-service", status="401"}[5m]) > 50
        for: 1m
        labels:
          severity: high
          zone: private-services
        annotations:
          summary: "High rate of authentication failures"
          description: "More than 50 failed login attempts per second detected. Possible credential stuffing attack."

      - alert: QueueBacklogCritical
        expr: kafka_consumergroup_lag{topic="scan-jobs"} > 1000
        for: 5m
        labels:
          severity: warning
          zone: private-services
        annotations:
          summary: "Scan orchestrator queue backlog"
          description: "Queue depth exceeded 1000. Auto-scaling may be failing or under volumetric attack."
