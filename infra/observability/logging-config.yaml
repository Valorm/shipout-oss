# VibeAudit Global Logging Configuration (FluentBit)
service:
  flush: 1
  log_level: info
  parsers_file: parsers.conf

pipeline:
  inputs:
    - name: forward
      listen: 0.0.0.0
      port: 24224
  
  filters:
    - name: record_modifier
      match: *
      record: environment production
    
    # MANDATORY: Redact sensitive fields (tokens, passwords, PII) before shipping
    - name: lua
      match: *
      script: /etc/fluent-bit/scripts/redact.lua
      call: cb_redact

  outputs:
    # Hot Storage for active monitoring & alerting
    - name: kafka
      match: *
      brokers: kafka.internal.vibeaudit.net:9092
      topics: security-audit-logs
      
    # Cold Storage (WORM) for compliance and forensics
    - name: s3
      match: *
      bucket: vibeaudit-immutable-logs-prod
      region: us-east-1
      store_dir: /tmp/fluent-bit/s3
      upload_timeout: 1m
