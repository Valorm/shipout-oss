# OpenTelemetry Tracing Configuration
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
  # Redact sensitive data from traces
  attributes/redact:
    actions:
      - key: http.request.header.authorization
        action: delete

exporters:
  jaeger:
    endpoint: jaeger-collector.internal:14250
    tls:
      insecure: false
