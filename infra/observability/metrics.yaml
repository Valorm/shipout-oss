# Prometheus Metrics Configuration
scrape_configs:
  - job_name: 'api-gateway'
    scrape_interval: 10s
    metrics_path: '/metrics'
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/internal-ca.pem
  
  - job_name: 'scan-workers'
    scrape_interval: 5s
    metrics_path: '/metrics'
    ec2_sd_configs:
      - region: us-east-1
        port: 9090
