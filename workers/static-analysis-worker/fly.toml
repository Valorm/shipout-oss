# fly.toml app configuration file for shipout-worker
# This worker is a standalone machine, not a web service.

app = "shipout-worker"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[processes]
  app = "npm run worker"

# Intentionally no [http_service] block:
# this is a background worker and must not be treated as an HTTP app that can be autostopped.

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
